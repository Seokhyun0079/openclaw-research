<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenClaw 조사 보고서 아카이브">
  <title>OpenClaw Research</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --bg-accent: #e8eef8;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-hover: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(15, 23, 42, 0.08);
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.12);
      --shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
      --radius: 16px;
      --font: "SF Pro Display", "Hiragino Sans", "Apple SD Gothic Neo", system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f17;
        --bg-accent: #121826;
        --surface: rgba(22, 28, 40, 0.92);
        --surface-hover: #1a2233;
        --text: #eef2ff;
        --muted: #94a3b8;
        --border: rgba(255, 255, 255, 0.08);
        --accent: #818cf8;
        --accent-soft: rgba(129, 140, 248, 0.16);
        --shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, var(--accent-soft), transparent),
        linear-gradient(180deg, var(--bg-accent), var(--bg));
      line-height: 1.55;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }
    .subtitle a {
      color: var(--accent);
      text-decoration: none;
    }
    .subtitle a:hover { text-decoration: underline; }
    .toolbar {
      position: sticky;
      top: 0.75rem;
      z-index: 10;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.5rem;
      padding: 0.65rem;
      border-radius: calc(var(--radius) + 4px);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 0.95rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.1rem;
      height: 1.1rem;
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 0.85rem 2.5rem 0.85rem 2.65rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 0.98rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    #search::placeholder { color: var(--muted); }
    #clear {
      display: none;
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 0.35rem 0.5rem;
      border-radius: 8px;
      font-size: 1.1rem;
      line-height: 1;
    }
    #clear:hover { background: var(--accent-soft); color: var(--accent); }
    .count {
      flex-shrink: 0;
      padding: 0.55rem 0.85rem;
      border-radius: 10px;
      background: var(--bg);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      gap: 1rem;
    }
    .card {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-2px);
      background: var(--surface-hover);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
    }
    .card.hidden { display: none; }
    .card-link {
      display: block;
      padding: 1.25rem 1.35rem 1.35rem;
      color: inherit;
      text-decoration: none;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.65rem;
    }
    time {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
    }
    .arrow {
      color: var(--muted);
      font-size: 1.1rem;
      transition: transform 0.18s ease, color 0.18s ease;
    }
    .card:hover .arrow {
      transform: translateX(3px);
      color: var(--accent);
    }
    .card h2 {
      margin: 0 0 0.55rem;
      font-size: 1.15rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      line-height: 1.35;
    }
    .excerpt {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .empty-state, .no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
      background: var(--surface);
    }
    .no-results { display: none; }
    .no-results.visible { display: block; }
    footer {
      margin-top: 2.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    @media (max-width: 640px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .count { text-align: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="badge">OpenClaw Archive</div>
      <h1>Research</h1>
      <p class="subtitle">조사 보고서 모음 · <a href="https://github.com/Seokhyun0079/openclaw-research">GitHub</a></p>
    </header>

    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/>
        </svg>
        <input id="search" type="search" placeholder="제목·내용·날짜 검색…" autocomplete="off" spellcheck="false">
        <button id="clear" type="button" aria-label="검색 지우기">×</button>
      </div>
      <div class="count" id="count">2 reports</div>
    </div>

    <div class="grid" id="grid">
    <article class="card" data-search="出産準備ガイド 2026-07-04 ベビーカー · ベビーベッド · 内祝い · 韓国ハーフの手続き · 婚姻届 · 奥戸・小岩の病院">
      <a class="card-link" href="reports/2026-07-04-report-0fb80cc6.html">
        <div class="card-top">
          <time datetime="2026-07-04">2026-07-04</time>
          <span class="arrow" aria-hidden="true">→</span>
        </div>
        <h2>出産準備ガイド</h2>
        <p class="excerpt">ベビーカー · ベビーベッド · 内祝い · 韓国ハーフの手続き · 婚姻届 · 奥戸・小岩の病院</p>
      </a>
    </article>
    <article class="card" data-search="openclaw research 시작 2026-07-04 openclaw research · 2026-07-04">
      <a class="card-link" href="reports/2026-07-04-openclaw-research-b97805cc.html">
        <div class="card-top">
          <time datetime="2026-07-04">2026-07-04</time>
          <span class="arrow" aria-hidden="true">→</span>
        </div>
        <h2>OpenClaw Research 시작</h2>

    </article>
    </div>
    <p class="no-results" id="no-results">검색 결과가 없습니다.</p>

    <footer>OpenClaw · GitHub Pages</footer>
  </div>

  <script id="reports-data" type="application/json">[{"date": "2026-07-04", "title": "出産準備ガイド", "slug": "2026-07-04-report-0fb80cc6", "url": "reports/2026-07-04-report-0fb80cc6.html", "excerpt": "ベビーカー · ベビーベッド · 内祝い · 韓国ハーフの手続き · 婚姻届 · 奥戸・小岩の病院"}, {"date": "2026-07-04", "title": "OpenClaw Research 시작", "slug": "2026-07-04-openclaw-research-b97805cc", "url": "reports/2026-07-04-openclaw-research-b97805cc.html", "excerpt": "OpenClaw Research · 2026-07-04"}]</script>
  <script>
    (function () {
      var input = document.getElementById('search');
      var clear = document.getElementById('clear');
      var grid = document.getElementById('grid');
      var countEl = document.getElementById('count');
      var noResults = document.getElementById('no-results');
      var cards = Array.prototype.slice.call(grid.querySelectorAll('.card'));

      function normalize(s) {
        return (s || '').toLowerCase().normalize('NFKC');
      }

      function filter() {
        var q = normalize(input.value.trim());
        clear.style.display = q ? 'block' : 'none';
        var visible = 0;
        cards.forEach(function (card) {
          var hay = normalize(card.getAttribute('data-search') || '');
          var show = !q || hay.indexOf(q) !== -1;
          card.classList.toggle('hidden', !show);
          if (show) visible++;
        });
        countEl.textContent = q ? visible + ' / ' + cards.length + ' reports' : cards.length + ' reports';
        noResults.classList.toggle('visible', cards.length > 0 && visible === 0);
      }

      input.addEventListener('input', filter);
      clear.addEventListener('click', function () {
        input.value = '';
        input.focus();
        filter();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === '/' && document.activeElement !== input) {
          e.preventDefault();
          input.focus();
        }
      });
    })();
  </script>
</body>
</html>
