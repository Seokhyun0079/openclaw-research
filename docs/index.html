<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw Research</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      line-height: 1.6;
      max-width: 52rem;
      margin: 2rem auto;
      padding: 0 1.25rem;
      color: #1a1a1a;
      background: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #e8e8e8; background: #111; }
      a { color: #6eb5ff; }
      li { border-color: #333; }
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; margin-bottom: 2rem; }
    @media (prefers-color-scheme: dark) { .subtitle { color: #999; } }
    ul { list-style: none; padding: 0; }
    li {
      padding: 0.75rem 0;
      border-bottom: 1px solid #ddd;
    }
    a { text-decoration: none; color: #0969da; }
    a:hover { text-decoration: underline; }
    .date { font-size: 0.875rem; color: #666; }
    @media (prefers-color-scheme: dark) { .date { color: #888; } }
    .empty { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h1>OpenClaw Research</h1>
  <p class="subtitle">OpenClaw 조사 결과 모음 · <a href="https://github.com/Seokhyun0079/openclaw-research">GitHub</a></p>
  <ul id="reports">
    <li class="empty">아직 보고서가 없습니다.</li>
  </ul>
</body>
</html>
